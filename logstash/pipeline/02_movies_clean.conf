# ─────────────────────────────────────────────────────────────
# 02_movies_clean.conf — Nettoyage + normalisation → movies_clean
# Format réel : genres/credits séparés par des tirets
# ─────────────────────────────────────────────────────────────

input {
  file {
    path            => "/data/movies.csv"
    start_position  => "beginning"
    sincedb_path    => "/dev/null"
    codec           => plain { charset => "UTF-8" }
  }
}

filter {
  csv {
    separator  => ","
    quote_char => '"'
    columns    => [
      "id", "title", "genres", "original_language", "overview",
      "popularity", "production_companies", "release_date", "budget",
      "revenue", "runtime", "status", "tagline", "vote_average",
      "vote_count", "credits", "keywords", "poster_path",
      "backdrop_path", "recommendations"
    ]
    skip_header => true
  }

  # 1. Supprimer les lignes sans titre ou sans id
  if [title] == "" or ![id] {
    drop { }
  }

  # 2. Nettoyer les valeurs "nil" textuelles et vides AVANT conversion
  ruby {
    code => '
      ["budget", "revenue", "runtime", "popularity",
       "vote_average", "vote_count", "id"].each do |f|
        val = event.get(f)
        if val.nil? || val.to_s.strip == "nil" || val.to_s.strip == ""
          event.remove(f)
        end
      end
    '
  }

  # 3. Conversion des types numériques
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "budget"       => "float"
      "revenue"      => "float"
      "runtime"      => "float"
      "vote_average" => "float"
      "vote_count"   => "float"
    }
  }

  # 4. Parse de la date de sortie
  date {
    match          => ["release_date", "yyyy-MM-dd"]
    target         => "release_date"
    tag_on_failure => ["_date_parse_failure"]
  }

  # 5. Normalisation des champs séparés par des tirets
  ruby {
    code => '
      # Genres : "Action-Adventure-Fantasy" → ["Action", "Adventure", "Fantasy"]
      genres_raw = event.get("genres")
      if genres_raw && !genres_raw.to_s.strip.empty? && genres_raw.to_s.strip != "nil"
        event.set("genres", genres_raw.split("-").map(&:strip).reject(&:empty?))
      else
        event.set("genres", [])
      end

      # Production companies : "Studio A-Studio B" → ["Studio A", "Studio B"]
      prod_raw = event.get("production_companies")
      if prod_raw && !prod_raw.to_s.strip.empty? && prod_raw.to_s.strip != "nil"
        event.set("production_companies", prod_raw.split("-").map(&:strip).reject(&:empty?))
      else
        event.set("production_companies", [])
      end

      # Keywords : "sword-revenge-viking" → ["sword", "revenge", "viking"]
      kw_raw = event.get("keywords")
      if kw_raw && !kw_raw.to_s.strip.empty? && kw_raw.to_s.strip != "nil"
        event.set("keywords", kw_raw.split("-").map(&:strip).reject(&:empty?))
      else
        event.set("keywords", [])
      end

      # Credits (acteurs) : "Actor A-Actor B-Actor C" → 5 premiers
      credits_raw = event.get("credits")
      if credits_raw && !credits_raw.to_s.strip.empty? && credits_raw.to_s.strip != "nil"
        cast = credits_raw.split("-").map(&:strip).reject(&:empty?).first(5)
        event.set("cast", cast)
      else
        event.set("cast", [])
      end
    '
  }

  # 6. Supprimer les champs inutiles
  mutate {
    remove_field => [
      "message", "@version", "host", "log", "event",
      "poster_path", "backdrop_path", "recommendations", "credits"
    ]
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_clean"
    document_id => "%{id}"
  }
  stdout { codec => dots }
}