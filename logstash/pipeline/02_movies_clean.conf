# ─────────────────────────────────────────────────────────────
# 02_movies_clean.conf — Nettoyage + normalisation → movies_clean
# ─────────────────────────────────────────────────────────────

input {
  file {
    path            => "/data/movies.csv"
    start_position  => "beginning"
    sincedb_path    => "/dev/null"
    codec           => plain { charset => "UTF-8" }
  }
}

filter {
  csv {
    separator  => ","
    quote_char => '"'
    columns    => [
      "id", "title", "genres", "original_language", "overview",
      "popularity", "production_companies", "release_date", "budget",
      "revenue", "runtime", "status", "tagline", "vote_average",
      "vote_count", "credits", "keywords", "poster_path",
      "backdrop_path", "recommendations"
    ]
    skip_header => true
  }

  # 1. Supprimer les lignes sans titre ou sans id
  if [title] == "" or ![id] {
    drop { }
  }

  # 2. Conversion des types numériques
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "budget"       => "integer"
      "revenue"      => "integer"
      "runtime"      => "integer"
      "vote_average" => "float"
      "vote_count"   => "integer"
    }
  }

  # 3. Parse de la date de sortie
  date {
    match          => ["release_date", "yyyy-MM-dd"]
    target         => "release_date"
    tag_on_failure => ["_date_parse_failure"]
  }

  # 4. Normalisation des champs JSON imbriqués (genres, keywords, etc.)
  ruby {
    code => '
      require "json"

      ["genres", "keywords", "production_companies"].each do |field|
        raw = event.get(field)
        next if raw.nil? || raw.strip.empty?
        begin
          parsed = JSON.parse(raw)
          if parsed.is_a?(Array)
            names = parsed.map { |item| item["name"] }.compact
            event.set(field, names)
          end
        rescue
          event.set(field, [])
        end
      end

      # Extraction des 5 premiers acteurs depuis credits
      credits_raw = event.get("credits")
      unless credits_raw.nil? || credits_raw.strip.empty?
        begin
          credits_data = JSON.parse(credits_raw)
          if credits_data.is_a?(Hash) && credits_data["cast"]
            cast_names = credits_data["cast"]
              .first(5)
              .map { |c| c["name"] }
              .compact
            event.set("cast", cast_names)
          end
        rescue
          event.set("cast", [])
        end
      end
    '
  }

  # 5. Remplacer les valeurs à 0 (= données manquantes) par null
  if [budget]  == 0 { mutate { replace => { "budget"  => nil } } }
  if [revenue] == 0 { mutate { replace => { "revenue" => nil } } }
  if [runtime] == 0 { mutate { replace => { "runtime" => nil } } }

  # 6. Supprimer les champs inutiles
  mutate {
    remove_field => [
      "message", "@version", "host", "log", "event",
      "poster_path", "backdrop_path", "recommendations", "credits"
    ]
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_clean"
    document_id => "%{id}"
  }
  stdout { codec => dots }
}
