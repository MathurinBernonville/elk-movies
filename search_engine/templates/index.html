<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080808;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --border:    #222222;
      --accent:    #e8c96d;
      --accent2:   #c0392b;
      --text:      #f0ede8;
      --muted:     #666660;
      --dim:       #333330;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 60px 0;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── SEARCH ZONE ── */
    .search-zone {
      padding: 40px 60px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0f0f0f 0%, var(--bg) 100%);
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
      max-width: 900px;
    }

    .search-main {
      flex: 1;
      position: relative;
    }

    .search-main input {
      width: 100%;
      padding: 16px 20px 16px 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-main input:focus {
      border-color: var(--accent);
    }

    .search-main::before {
      content: '⌕';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1.3rem;
      pointer-events: none;
    }

    .filters {
      display: flex;
      gap: 8px;
    }

    .filters input, .filters select {
      padding: 16px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
      width: 130px;
    }

    .filters input:focus, .filters select:focus {
      border-color: var(--accent);
    }

    .filters select option {
      background: var(--surface2);
    }

    .btn-search {
      padding: 16px 32px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-search:hover { background: #f0d47d; }
    .btn-search:active { transform: scale(0.98); }

    /* ── FILTER TAGS ── */
    .filter-tags {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .tag-btn {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--dim);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag-btn:hover, .tag-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── MAIN CONTENT ── */
    main {
      padding: 32px 60px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .results-count {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .results-count strong {
      color: var(--accent);
      font-weight: 500;
    }

    .sort-row {
      display: flex;
      gap: 8px;
    }

    .sort-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--dim);
      border-radius: 2px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .sort-btn:hover, .sort-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      padding: 24px;
      position: relative;
      transition: background 0.2s;
      cursor: default;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .card:hover { background: var(--surface2); }
    .card:hover::after { transform: scaleY(1); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1.1;
      flex: 1;
    }

    .card-rating {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .rating-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      line-height: 1;
    }

    .rating-max {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .pill {
      padding: 3px 8px;
      border: 1px solid var(--dim);
      border-radius: 2px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pill.genre { border-color: #2a2a2a; color: #888; }
    .pill.year  { color: var(--accent); border-color: #3a3520; }
    .pill.lang  { color: #7a9e7a; border-color: #1a2a1a; }
    .pill.runtime { color: #7a8a9e; border-color: #1a202a; }

    .card-overview {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-cast {
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.05em;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: auto;
    }

    .card-cast span {
      color: #555;
    }

    .card-score {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1/-1;
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      color: var(--dim);
      margin-bottom: 8px;
    }

    /* ── LOADING ── */
    .loading {
      grid-column: 1/-1;
      padding: 60px;
      text-align: center;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 40px 0 20px;
    }

    .page-btn {
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-btn:disabled:hover { border-color: var(--border); color: var(--muted); }

    .page-info {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0 12px;
    }

    /* ── WELCOME ── */
    .welcome {
      padding: 80px 60px;
      text-align: center;
    }

    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 0.05em;
      color: var(--dim);
      margin-bottom: 12px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .welcome .hint {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hint-item {
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hint-item strong {
      color: var(--accent);
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

    input::placeholder { color: var(--muted); }

    @media (max-width: 768px) {
      header, .search-zone, main { padding-left: 20px; padding-right: 20px; }
      .search-row { flex-direction: column; }
      .filters { flex-wrap: wrap; }
      .filters input, .filters select { width: calc(50% - 4px); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="logo">Cine<span>Search</span></div>
    </div>
    <div class="tagline">662 083 films · Powered by Elasticsearch</div>
  </header>

  <div class="search-zone">
    <div class="search-row">
      <div class="search-main">
        <input id="q" type="text" placeholder="Titre, synopsis, tagline…" autocomplete="off">
      </div>
      <div class="filters">
        <input id="genre"    type="text"   placeholder="Genre">
        <input id="language" type="text"   placeholder="Langue (en, fr…)">
        <input id="year"     type="number" placeholder="Année" min="1900" max="2030">
      </div>
      <button class="btn-search" onclick="doSearch(1)">Rechercher</button>
    </div>

    <div class="filter-tags">
      <span style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;align-self:center;margin-right:4px">Genres rapides :</span>
      <button class="tag-btn" onclick="quickGenre('Action')">Action</button>
      <button class="tag-btn" onclick="quickGenre('Drama')">Drame</button>
      <button class="tag-btn" onclick="quickGenre('Comedy')">Comédie</button>
      <button class="tag-btn" onclick="quickGenre('Thriller')">Thriller</button>
      <button class="tag-btn" onclick="quickGenre('Science Fiction')">Sci-Fi</button>
      <button class="tag-btn" onclick="quickGenre('Horror')">Horreur</button>
      <button class="tag-btn" onclick="quickGenre('Romance')">Romance</button>
      <button class="tag-btn" onclick="quickGenre('Animation')">Animation</button>
    </div>
  </div>

  <main>
    <div id="results-header" class="results-header" style="display:none">
      <div class="results-count" id="results-count"></div>
      <div class="sort-row">
        <button class="sort-btn active" id="sort-score" onclick="setSort('score')">Pertinence</button>
        <button class="sort-btn" id="sort-rating" onclick="setSort('rating')">Note</button>
        <button class="sort-btn" id="sort-pop" onclick="setSort('popularity')">Popularité</button>
        <button class="sort-btn" id="sort-date" onclick="setSort('date')">Date</button>
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="welcome">
        <h2>662 083 Films</h2>
        <p>Recherchez par titre, synopsis, genre, langue ou année</p>
        <div class="hint">
          <div class="hint-item"><strong>662K</strong>Films indexés</div>
          <div class="hint-item"><strong>ES</strong>Elasticsearch</div>
          <div class="hint-item"><strong>8.13</strong>Stack ELK</div>
        </div>
      </div>
    </div>

    <div class="pagination" id="pagination" style="display:none"></div>
  </main>

  <script>
    let currentPage = 1;
    let currentSort = 'score';
    let lastQuery   = {};

    function quickGenre(g) {
      document.getElementById('genre').value = g;
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      doSearch(1);
    }

    function setSort(s) {
      currentSort = s;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sort-' + s).classList.add('active');
      doSearch(currentPage);
    }

    function starsHtml(rating) {
      if (!rating || rating === 0) return '';
      const r = Math.round(rating / 2);
      return '★'.repeat(r) + '☆'.repeat(5 - r);
    }

    async function doSearch(page = 1) {
      currentPage = page;
      const q        = document.getElementById('q').value.trim();
      const genre    = document.getElementById('genre').value.trim();
      const language = document.getElementById('language').value.trim();
      const year     = document.getElementById('year').value.trim();

      lastQuery = { q, genre, language, year };

      // Show loading
      document.getElementById('grid').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div style="font-size:0.75rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase">Recherche en cours…</div>
        </div>`;
      document.getElementById('results-header').style.display = 'none';
      document.getElementById('pagination').style.display = 'none';

      const params = new URLSearchParams({ q, genre, language, year, page, sort: currentSort });

      try {
        const data = await fetch(`/search?${params}`).then(r => r.json());
        renderResults(data, page);
      } catch(e) {
        document.getElementById('grid').innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠</div>
            <h3>Erreur de connexion</h3>
            <p>Vérifiez qu'Elasticsearch est bien démarré</p>
          </div>`;
      }
    }

    function renderResults(data, page) {
      const total      = data.total;
      const results    = data.results;
      const totalPages = Math.ceil(total / 10);

      // Header
      document.getElementById('results-header').style.display = 'flex';
      document.getElementById('results-count').innerHTML =
        `<strong>${total.toLocaleString('fr-FR')}</strong> résultat${total > 1 ? 's' : ''}`;

      // Cards
      if (!results.length) {
        document.getElementById('grid').innerHTML = `
          <div class="empty">
            <div class="empty-icon">◎</div>
            <h3>Aucun résultat</h3>
            <p>Essayez avec d'autres termes ou filtres</p>
          </div>`;
        return;
      }

      document.getElementById('grid').innerHTML = results.map(m => {
        const year    = m.date ? m.date.substring(0,4) : null;
        const genres  = (m.genres || []).slice(0,3);
        const cast    = (m.cast || []).slice(0,4).join(' · ');
        const runtime = m.runtime ? `${m.runtime} min` : null;
        const rating  = m.rating ? parseFloat(m.rating).toFixed(1) : null;
        const overview = m.overview ? m.overview.substring(0,180) + (m.overview.length > 180 ? '…' : '') : null;

        return `
          <div class="card">
            <div class="card-top">
              <div class="card-title">${m.title || 'Sans titre'}</div>
              ${rating && rating > 0 ? `
                <div class="card-rating">
                  <div class="rating-value">${rating}</div>
                  <div class="rating-max">/10</div>
                </div>` : ''}
            </div>

            <div class="card-meta">
              ${year    ? `<span class="pill year">${year}</span>` : ''}
              ${m.language ? `<span class="pill lang">${m.language.toUpperCase()}</span>` : ''}
              ${runtime ? `<span class="pill runtime">${runtime}</span>` : ''}
              ${genres.map(g => `<span class="pill genre">${g}</span>`).join('')}
            </div>

            ${overview ? `<div class="card-overview">${overview}</div>` : ''}

            ${cast ? `
              <div class="card-cast">
                <span>Avec</span> ${cast}
              </div>` : ''}

            <div class="card-score">ES ${m.score}</div>
          </div>`;
      }).join('');

      // Pagination
      const pag = document.getElementById('pagination');
      pag.style.display = 'flex';
      pag.innerHTML = `
        <button class="page-btn" onclick="doSearch(${page-1})" ${page<=1?'disabled':''}>← Précédent</button>
        <span class="page-info">Page ${page} / ${totalPages}</span>
        <button class="page-btn" onclick="doSearch(${page+1})" ${page>=totalPages?'disabled':''}>Suivant →</button>`;
    }

    // Raccourcis clavier
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch(1);
    });

    // Focus automatique
    document.getElementById('q').focus();
  </script>
</body>
</html>
